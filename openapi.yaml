openapi: 3.1.0
info:
  title: Pi-Bench Telemetry API
  version: 1.0.0
  description: |
    Single contract for all Pi-Bench submissions. Each implementation
    MUST conform exactly to this contract. Divergent behavior
    disqualifies the submission from the benchmark.
  license:
    name: MIT
servers:
  - url: http://localhost:8080
    description: via load balancer

paths:
  /healthz:
    get:
      summary: Liveness probe
      description: Returns 200 while the process is alive. Does not query storage.
      responses:
        '200':
          description: alive

  /readyz:
    get:
      summary: Readiness probe
      description: |
        200 when the service is ready to receive traffic (storage OK,
        pool established). Storage accepted by the challenge: redis, postgres,
        mariadb or mysql (see docs/pt-br/security.md).
      responses:
        '200': { description: ready }
        '503': { description: not ready }

  /metrics:
    get:
      summary: Prometheus exposition
      responses:
        '200':
          description: ok
          content:
            text/plain; version=0.0.4: {}

  /devices/{id}/telemetry:
    post:
      summary: Ingest a telemetry point
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]{1,64}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryPoint'
      responses:
        '202':
          description: accepted (persistence may be synchronous or async)
        '400':
          description: invalid payload
        '413':
          description: payload too large
        '429':
          description: rate limited (optional)

    get:
      summary: Query a time window
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, pattern: '^[a-zA-Z0-9_-]{1,64}$' }
        - in: query
          name: from
          required: true
          schema: { type: integer, format: int64, description: epoch millis }
        - in: query
          name: to
          required: true
          schema: { type: integer, format: int64, description: epoch millis }
        - in: query
          name: limit
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
        - in: query
          name: cursor
          schema: { type: string, description: opaque cursor for pagination }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [points]
                properties:
                  points:
                    type: array
                    items: { $ref: '#/components/schemas/TelemetryPoint' }
                  next_cursor:
                    type: string
                    nullable: true
        '400': { description: invalid parameters }
        '404': { description: device has no data }

  /devices/{id}/telemetry/batch:
    post:
      summary: Batch ingestion
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, pattern: '^[a-zA-Z0-9_-]{1,64}$' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [points]
              properties:
                points:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items: { $ref: '#/components/schemas/TelemetryPoint' }
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted: { type: integer }
        '400': { description: invalid batch }
        '413': { description: batch exceeds 100 points }

  /devices/{id}/anomaly:
    get:
      summary: Z-score of the acceleration magnitude over the last 256 points
      description: |
        Computes magnitude = sqrt(ax^2 + ay^2 + az^2) for each of the
        last 256 points of the device, then the z-score of the most recent
        point against the mean and standard deviation of that window. No cache allowed.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, pattern: '^[a-zA-Z0-9_-]{1,64}$' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [z_score, samples, anomalous]
                properties:
                  z_score:    { type: number }
                  samples:    { type: integer, minimum: 0, maximum: 256 }
                  anomalous:  { type: boolean, description: 'true if |z| > 3' }
                  mean:       { type: number }
                  stddev:     { type: number }
        '404':
          description: device has insufficient data (< 8 points)

components:
  schemas:
    TelemetryPoint:
      type: object
      required: [ts, lat, lon, ax, ay, az]
      properties:
        ts:      { type: integer, format: int64, description: epoch millis }
        lat:     { type: number, minimum: -90,  maximum: 90 }
        lon:     { type: number, minimum: -180, maximum: 180 }
        battery: { type: number, minimum: 0,    maximum: 1 }
        ax:      { type: number }
        ay:      { type: number }
        az:      { type: number }
