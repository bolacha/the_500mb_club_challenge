name: PR Security Comment

# ---------------------------------------------------------------------------
# Padrao seguro recomendado pelo GitHub para comentar em PRs de forks.
#
# O workflow "PR Security Gate" roda como `pull_request` (sem segredos, sem
# permissao de escrita) e sobe o relatorio como artifact. ESTE workflow e
# disparado pela conclusao daquele via `workflow_run`, roda no contexto da
# BASE do repo (tem permissao de escrita no PR) e SOMENTE le um artifact de
# texto + escreve um comentario. Nunca faz checkout nem executa codigo do PR.
# ---------------------------------------------------------------------------

on:
  workflow_run:
    workflows: ["PR Security Gate"]
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  actions: read

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download artifacts from the validation run
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts
          merge-multiple: true

      - name: Comment on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let prNumber;
            try {
              prNumber = fs.readFileSync('artifacts/pr_number', 'utf8').trim();
            } catch (e) {
              core.warning('pr_number missing; nothing to comment');
              return;
            }

            let body;
            try {
              body = fs.readFileSync('artifacts/report.md', 'utf8');
            } catch (e) {
              body = '_Security report not generated (no compose changed?)._';
            }

            const conclusion = context.payload.workflow_run.conclusion;
            const header = conclusion === 'success'
              ? '## ✅ The 500MB Club — PR Security Gate: PASSED\n\n'
              : '## ❌ The 500MB Club — PR Security Gate: FAILED\n\n' +
                'This PR **cannot be merged** until the ' +
                '`docs/en/security.md` violations below are resolved.\n\n';

            const marker = '<!-- the-500mb-club-security-gate -->';
            const fullBody = `${marker}\n${header}${body}`;

            // Atualiza o comentário existente em vez de empilhar novos.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(prNumber),
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(prNumber),
                body: fullBody,
              });
            }
